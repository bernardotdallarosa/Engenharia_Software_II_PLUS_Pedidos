# Monorepo: workflow na raiz do repositório GitHub.

name: CI — plus-mfe-ped

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths:
      - "plus-mfe-ped/**"
      - ".github/workflows/ci-plus-mfe-ped.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "plus-mfe-ped/**"
      - ".github/workflows/ci-plus-mfe-ped.yml"
  workflow_dispatch:

jobs:
  validacao:
    name: Type check, build e smoke do remote
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plus-mfe-ped
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plus-mfe-ped/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar type-check
        run: npm run type-check

      - name: Build do projeto
        env:
          VITE_MS_PED_URL: http://localhost:3007
        run: npm run build

      - name: Smoke test do remote
        run: test -f dist/assets/remoteEntry.js

  docker:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: validacao
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build --build-arg VITE_MS_PED_URL=http://localhost:3007 -t plus-mfe-ped:${{ github.sha }} plus-mfe-ped

  release:
    name: Publicar pacote NPM
    runs-on: ubuntu-latest
    needs: validacao
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: plus-mfe-ped
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plus-mfe-ped/package-lock.json
          registry-url: https://registry.npmjs.org
          scope: "@bernardodallarosa"

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        env:
          VITE_MS_PED_URL: http://localhost:3007
        run: npm run build

      - name: Publicar pacote no NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
