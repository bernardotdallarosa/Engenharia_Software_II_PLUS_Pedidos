# Monorepo: workflow na raiz do repositório GitHub.

name: CI — plus-ms-ped

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths:
      - "plus-ms-ped/**"
      - ".github/workflows/ci-plus-ms-ped.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "plus-ms-ped/**"
      - ".github/workflows/ci-plus-ms-ped.yml"
  workflow_dispatch:

jobs:
  testes:
    name: Instalar, testar e buildar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plus-ms-ped
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plus-ms-ped/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test

      - name: Build do projeto
        run: npm run build

  docker:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: testes
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t plus-ms-ped:${{ github.sha }} plus-ms-ped

  release:
    name: Publicar imagem no Docker Hub
    runs-on: ubuntu-latest
    needs: testes
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir tags da imagem
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/plus-ms-ped"
          TAGS="${IMAGE}:latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: plus-ms-ped
          push: true
          tags: ${{ steps.meta.outputs.tags }}
